services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: it_asset_db
      MYSQL_USER: it_asset_user
      MYSQL_PASSWORD: it_asset_password
      MYSQL_ROOT_PASSWORD: it_asset_root_password
    ports:
      - "3307:3306"
    volumes:
      - it_asset_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: it_asset_db
      DB_USER: it_asset_user
      DB_PASSWORD: it_asset_password
    ports:
      - "4100:4000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  it_asset_mysql:
